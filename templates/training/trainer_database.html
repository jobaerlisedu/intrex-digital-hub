{% extends 'erp_base.html' %}
{% block title %}Trainer Database - Intrex ERP{% endblock %}
{% block content %}

<style>
    .view-details-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
    }
    .view-detail-item {
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--sidebar-border);
        border-radius: 8px;
        padding: 12px;
    }
    .view-detail-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        font-weight: 700;
        color: var(--text-secondary);
        margin-bottom: 4px;
        letter-spacing: 0.5px;
    }
    .view-detail-value {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text-primary);
    }
</style>

<div class="glass-card" style="margin-bottom: 32px; min-height: 500px;">
    <!-- Directory Header -->
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--sidebar-border); padding-bottom: 16px; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;">
        <h3 style="margin: 0; font-size: 1.25rem; color: var(--text-primary); display: flex; align-items: center; gap: 10px;">
            <i class="fa-solid fa-chalkboard-user" style="color: var(--accent-color);"></i>
            Trainer Database
        </h3>
        
        <!-- Search and Filters -->
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <input type="text" id="search-trainer" oninput="filterTrainers()" class="form-control" style="width: 220px; height: 36px; padding: 6px 12px;" placeholder="Search name, phone...">
            <select id="filter-type" onchange="filterTrainers()" class="form-control" style="width: auto; min-width: 140px; height: 36px; padding: 6px 12px;">
                <option value="">All Types</option>
                <!-- Dynamically populated via JS -->
            </select>
            <button onclick="resetFilters()" class="btn-submit" style="padding: 6px 12px; height: 36px; background: #215c5c; display: flex; align-items: center; justify-content: center;" title="Reset Filters">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
        </div>
    </div>

    <!-- Table -->
    <div style="overflow-x: auto;">
        <table class="data-table">
            <thead>
                <tr style="background-color: #f8fafc; border-bottom: 1px solid var(--sidebar-border);">
                    <th style="font-weight: 600; color: var(--text-primary); text-align: center; width: 140px;">Trainer ID</th>
                    <th style="font-weight: 600; color: var(--text-primary);">Trainer Name</th>
                    <th style="font-weight: 600; color: var(--text-primary);">Designation</th>
                    <th style="font-weight: 600; color: var(--text-primary);">Email</th>
                    <th style="font-weight: 600; color: var(--text-primary);">Phone</th>
                    <th style="font-weight: 600; color: var(--text-primary); width: 160px;">Type</th>
                    <th style="font-weight: 600; color: var(--text-primary); text-align: center; width: 100px;">Status</th>
                    <th style="font-weight: 600; color: var(--text-primary); text-align: center; width: 100px;">Actions</th>
                </tr>
            </thead>
            <tbody id="trainer-table-body">
                <!-- Dynamically Populated -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // Load trainers json
    const trainersDb = {{ trainers_json|safe }};

    window.addEventListener("DOMContentLoaded", () => {
        populateTypesFilter();
        renderTrainers();
    });

    // Populate type filter select dynamically
    function populateTypesFilter() {
        const select = document.getElementById("filter-type");
        if (!select) return;

        // Get unique, non-empty employee types
        const types = [...new Set(trainersDb.map(t => t.employee_type).filter(Boolean))];
        types.sort().forEach(type => {
            const opt = document.createElement("option");
            opt.value = type;
            opt.textContent = type;
            select.appendChild(opt);
        });
    }

    // Render trainers directory list
    function renderTrainers() {
        const tbody = document.getElementById("trainer-table-body");
        if (!tbody) return;

        const searchQuery = document.getElementById("search-trainer").value.toLowerCase().trim();
        const typeFilter = document.getElementById("filter-type").value;

        const filtered = trainersDb.filter(t => {
            const matchesSearch = !searchQuery ||
                (t.employee_name && t.employee_name.toLowerCase().includes(searchQuery)) ||
                (t.employee_id && t.employee_id.toLowerCase().includes(searchQuery)) ||
                (t.email && t.email.toLowerCase().includes(searchQuery)) ||
                (t.mobile_phone && t.mobile_phone.includes(searchQuery)) ||
                (t.phone && t.phone.includes(searchQuery));

            const matchesType = !typeFilter || t.employee_type === typeFilter;
            return matchesSearch && matchesType;
        });

        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: var(--text-secondary); padding: 48px;">No trainers found.</td></tr>`;
            return;
        }

        tbody.innerHTML = filtered.map(t => {
            const statusClass = t.status === "Active" ? "success" : "danger";
            
            // Badge style for employee type
            let typeBadgeClass = "secondary";
            if (t.employee_type === "Permanent") {
                typeBadgeClass = "success";
            } else if (t.employee_type === "Contractual") {
                typeBadgeClass = "warning";
            } else if (t.employee_type === "Part-time" || t.employee_type === "External Professionals") {
                typeBadgeClass = "info";
            }

            return `
                <tr>
                    <td style="text-align: center;"><code style="font-weight: 700; color: var(--text-primary); font-family: monospace; font-size: 0.95rem;">${t.employee_id || '—'}</code></td>
                    <td><strong style="color: var(--text-primary);">${t.employee_name}</strong></td>
                    <td>${t.designation || '—'}</td>
                    <td>
                        ${t.email ? `
                            <a href="mailto:${t.email}" style="color: var(--accent-color); text-decoration: none; display: inline-flex; align-items: center; gap: 6px;">
                                <i class="fa-solid fa-envelope" style="font-size: 0.85rem;"></i>
                                ${t.email}
                            </a>
                        ` : '—'}
                    </td>
                    <td>
                        ${(t.mobile_phone || t.phone) ? `
                            <a href="tel:${t.mobile_phone || t.phone}" style="color: var(--accent-color); text-decoration: none; display: inline-flex; align-items: center; gap: 6px;">
                                <i class="fa-solid fa-phone" style="font-size: 0.85rem;"></i>
                                ${t.mobile_phone || t.phone}
                            </a>
                        ` : '—'}
                    </td>
                    <td><span class="badge ${typeBadgeClass}" style="font-size: 0.75rem; padding: 2px 6px;">${t.employee_type || '—'}</span></td>
                    <td style="text-align: center;"><span class="badge ${statusClass}">${t.status || 'Active'}</span></td>
                    <td style="text-align: center;">
                        <button type="button" onclick="viewTrainerDetails('${t.employee_id}')" class="btn-action edit" style="background: rgba(33, 92, 92, 0.1); color: var(--accent-color); border: 1px solid var(--accent-color); border-radius: 4px; padding: 4px 8px;" title="View Profile">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </td>
                </tr>
            `;
        }).join("");
    }

    function filterTrainers() {
        renderTrainers();
    }

    function resetFilters() {
        document.getElementById("search-trainer").value = '';
        document.getElementById("filter-type").value = '';
        renderTrainers();
    }

    // Modal popup system using openGlobalModal
    function viewTrainerDetails(id) {
        const record = trainersDb.find(t => t.employee_id === id);
        if (!record) return;

        const email = record.email ? `<a href="mailto:${record.email}" style="color: var(--accent-color); text-decoration: none;"><i class="fa-solid fa-envelope" style="color: var(--accent-color); margin-right: 8px;"></i>${record.email}</a>` : '—';
        const phone = (record.mobile_phone || record.phone) ? `<a href="tel:${record.mobile_phone || record.phone}" style="color: var(--accent-color); text-decoration: none;"><i class="fa-solid fa-phone" style="color: var(--accent-color); margin-right: 8px;"></i>${record.mobile_phone || record.phone}</a>` : '—';
        const statusClass = record.status === 'Active' ? 'success' : 'danger';
        
        let typeBadgeClass = "secondary";
        if (record.employee_type === "Permanent") {
            typeBadgeClass = "success";
        } else if (record.employee_type === "Contractual") {
            typeBadgeClass = "warning";
        } else if (record.employee_type === "Part-time" || record.employee_type === "External Professionals") {
            typeBadgeClass = "info";
        }

        const htmlContent = `
            <div class="view-details-grid">
                <div class="view-detail-item">
                    <div class="view-detail-label">TRAINER ID</div>
                    <div class="view-detail-value" style="font-family: monospace; font-weight: bold; color: var(--accent-color);">${record.employee_id || '—'}</div>
                </div>
                <div class="view-detail-item">
                    <div class="view-detail-label">FULL NAME</div>
                    <div class="view-detail-value">${record.employee_name}</div>
                </div>
                <div class="view-detail-item">
                    <div class="view-detail-label">DESIGNATION</div>
                    <div class="view-detail-value">${record.designation || '—'}</div>
                </div>
                <div class="view-detail-item">
                    <div class="view-detail-label">EMPLOYEE TYPE</div>
                    <div class="view-detail-value">
                        <span class="badge ${typeBadgeClass}" style="font-size: 0.85rem;">${record.employee_type || '—'}</span>
                    </div>
                </div>
                <div class="view-detail-item">
                    <div class="view-detail-label">DEPARTMENT</div>
                    <div class="view-detail-value">${record.department || '—'}</div>
                </div>
                <div class="view-detail-item">
                    <div class="view-detail-label">SUB DEPARTMENT</div>
                    <div class="view-detail-value">${record.subDepartment || '—'}</div>
                </div>
                <div class="view-detail-item">
                    <div class="view-detail-label">EMAIL ADDRESS</div>
                    <div class="view-detail-value">${email}</div>
                </div>
                <div class="view-detail-item">
                    <div class="view-detail-label">MOBILE PHONE</div>
                    <div class="view-detail-value">${phone}</div>
                </div>
                <div class="view-detail-item" style="grid-column: span 2;">
                    <div class="view-detail-label">EMPLOYMENT STATUS</div>
                    <div class="view-detail-value">
                        <span class="badge ${statusClass}">${record.status || 'Active'}</span>
                    </div>
                </div>
            </div>
        `;

        openGlobalModal("Trainer Profile Details - " + (record.employee_id || 'N/A'), htmlContent, record.employee_name, "TRAINER PROFILE");
    }
</script>
{% endblock %}
