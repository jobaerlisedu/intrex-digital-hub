{% if tabs %}
<div class="tab-header">
    {% for tab in tabs %}
    <button class="tab-btn{% if tab.active %} active{% endif %}" data-tab="{{ tab.id }}" onclick="switchTab(event, '{{ tab.id }}')">
        {% if tab.icon %}<i class="fa-solid fa-{{ tab.icon }}"></i>{% endif %}
        <span>{{ tab.label }}</span>
        {% if tab.count is not None %}
        <span class="tab-badge">{{ tab.count }}</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
{% endif %}
