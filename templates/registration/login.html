{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Intrex Digital Hub ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f3f6f6;
            --surface-color: #ffffff;
            --surface-border: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-primary: #215C5C;
            --accent-secondary: #75b66e;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(33, 92, 92, 0.08), transparent 45%),
                        radial-gradient(circle at bottom right, rgba(117, 182, 110, 0.08), transparent 45%);
        }
 
        .login-card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(33, 92, 92, 0.06);
            text-align: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .logo i { color: var(--accent-primary); }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(33, 92, 92, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #fff;
            padding: 14px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            width: 100%;
            display: block;
            border: none;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(33, 92, 92, 0.2);
        }

        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.15);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--accent-primary); }
    </style>
</head>
<body>

    <div class="login-card">
        <div style="margin-bottom: 12px; display: flex; justify-content: center;">
            <a href="{% url 'frontend:index' %}">
                <img src="{% static 'images/logo/intrex-logo.svg' %}" alt="Intrex Digital Hub Logo" style="height: 70px; width: auto;">
            </a>
        </div>
        <a href="{% url 'frontend:index' %}" class="logo" style="margin-bottom: 24px;">
            Intrex Digital Hub
        </a>
        
        <h2 style="margin-top: 0; margin-bottom: 8px;">Dashboard</h2>
        <p style="color: var(--text-secondary); margin-bottom: 32px; font-size: 0.9rem;">Sign in to securely access your data.</p>

        {% if form.errors %}
            <div class="error-message">
                <i class="fa-solid fa-triangle-exclamation"></i> Invalid username or password. Please try again.
            </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" class="form-control" autofocus required id="id_username">
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" class="form-control" required id="id_password">
            </div>
            
            <!-- Hidden input for next URL redirection after successful login -->
            <input type="hidden" name="next" value="{{ next|default:'' }}">
            
            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <a href="{% url 'frontend:index' %}" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </div>

</body>
</html>
